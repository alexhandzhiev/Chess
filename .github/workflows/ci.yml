name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build and test
        run: gradle test

      - name: Static analysis (SpotBugs)
        run: gradle spotbugsMain

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reports
          path: build/reports/
          if-no-files-found: ignore
